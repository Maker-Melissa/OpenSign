# OpenSign service configuration
#
# Edit these paths, then apply with:
#     sudo systemctl restart opensign
#
# OPENSIGN_VENV   - path to the virtual environment OpenSign is installed in
# OPENSIGN_SCRIPT - path to the Python script the service should run

OPENSIGN_VENV=/home/pi/opensign-venv
OPENSIGN_SCRIPT=/home/pi/startup.py
